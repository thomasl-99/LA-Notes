---
# Jekyll-config voor GitHub Pages — minimale setup
# Theme: minimaal, geen externe dependencies
# Live: https://thomasl-99.github.io/LA-Notes/

title: LA Notes
tagline: AI-vindbaarheid voor eenmanszaken
description: >-
  Resultaten van AI-vindbaarheid-trajecten: citaten in ChatGPT, Perplexity,
  Google AI Overviews voor restaurants, importeurs en kleine diensten.
author: Thomas Langeberg
email: zie humans.txt
url: https://thomasl-99.github.io
baseurl: /LA-Notes

# Markdown rendering
markdown: kramdown
highlighter: rouge
permalink: /:title/

# Theme
theme: minima

# Front-matter defaults voor posts
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author: Thomas Langeberg
      lang: nl

# Exclusies (niet inbouwen)
exclude:
  - README.md
  - LICENSE
  - CONTRIBUTING.md
  - .github/
  - assets/

# AI-vriendelijke permalinks
# Geen categorie-prefix, alle posts gelijke URL-diepte

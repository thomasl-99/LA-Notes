<!DOCTYPE html>
<html lang="{{ page.lang | default: 'nl' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>

  <meta name="description" content="{{ page.description | default: site.description | strip_html | normalize_whitespace | truncate: 160 }}">
  <meta name="author" content="{{ site.author }}">

  <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{{ page.description | default: site.description | strip_html | normalize_whitespace | truncate: 300 }}">
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:site_name" content="{{ site.title }}">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta name="twitter:description" content="{{ page.description | default: site.description | strip_html | normalize_whitespace | truncate: 200 }}">

  <link rel="alternate" type="application/atom+xml" title="{{ site.title }} — Feed" href="{{ site.baseurl }}/feed.xml">
  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <style>
    :root {
      --bg: #0d1117;
      --fg: #e6edf3;
      --accent: #d4a574;
      --muted: #8b949e;
      --link: #58a6ff;
      --border: #30363d;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Iowan Old Style', 'Charter', 'Georgia', serif;
      font-size: 18px;
      line-height: 1.7;
      max-width: 760px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    h1, h2, h3, h4 {
      font-family: 'Iowan Old Style', 'Charter', 'Georgia', serif;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin: 2rem 0 1rem;
    }
    h1 { font-size: 2.2rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
    h2 { font-size: 1.5rem; color: var(--accent); }
    h3 { font-size: 1.2rem; }
    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; }
    nav.site {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }
    nav.site .brand {
      font-family: 'Iowan Old Style', serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--accent);
    }
    ul, ol { margin: 1rem 0 1rem 1.5rem; }
    li { margin: 0.4rem 0; }
    p { margin: 1rem 0; }
    code {
      background: rgba(110, 118, 129, 0.2);
      padding: 0.1em 0.3em;
      border-radius: 3px;
      font-family: 'SF Mono', 'Consolas', monospace;
      font-size: 0.9em;
    }
    pre {
      background: #161b22;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem;
      overflow-x: auto;
      font-size: 0.85em;
    }
    blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 1rem;
      margin: 1rem 0;
      color: var(--muted);
      font-style: italic;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      margin: 1rem 0;
      font-size: 0.95em;
    }
    th, td {
      border: 1px solid var(--border);
      padding: 0.5rem 0.7rem;
      text-align: left;
    }
    th { background: rgba(212, 165, 116, 0.1); }
    .post-meta {
      color: var(--muted);
      font-size: 0.9em;
      margin-bottom: 1.5rem;
    }
    .ai-summary {
      background: rgba(88, 166, 255, 0.08);
      border-left: 3px solid var(--link);
      padding: 0.8rem 1rem;
      margin: 1.5rem 0;
      font-size: 0.95em;
      color: var(--muted);
    }
    footer {
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.85em;
    }
  </style>

  {% feed_meta %}
  {% seo %}

  {% if page.layout == 'post' %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BlogPosting",
    "headline": "{{ page.title | escape }}",
    "author": {"@type": "Person", "name": "{{ site.author }}"},
    "datePublished": "{{ page.date | date_to_xmlschema }}",
    "dateModified": "{{ page.date | date_to_xmlschema }}",
    "description": "{{ page.ai_summary | escape }}",
    "keywords": "{{ page.trefwoorden | join: ', ' }}",
    "inLanguage": "{{ page.lang | default: 'nl' }}",
    "isPartOf": {
      "@type": "Blog",
      "name": "{{ site.title }}",
      "url": "{{ site.baseurl }}/"
    },
    "publisher": {"@type": "Person", "name": "{{ site.author }}"},
    "url": "{{ page.url | absolute_url }}"
  }
  </script>
  {% endif %}
</head>
<body>

  <nav class="site">
    <a class="brand" href="{{ site.baseurl }}/">{{ site.title }}</a>
    <span>
      <a href="{{ site.baseurl }}/feed.xml">RSS</a> ·
      <a href="https://github.com/tjdlangeberg/LA-Notes">GitHub</a> ·
      <a href="{{ site.baseurl }}/_pricing/prijzen.html">Prijzen</a>
    </span>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer>
    <p>{{ site.author }} · {{ site.description }}</p>
    <p>Posts gelicenseerd onder <a href="https://creativecommons.org/licenses/by-sa/4.0/">CC BY-SA 4.0</a></p>
  </footer>

</body>
</html>
